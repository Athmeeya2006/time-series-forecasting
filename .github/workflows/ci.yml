name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile python files
        run: python -m compileall -q . -x ".venv|outputs"

      - name: Validate pip dependencies
        run: python -m pip check

  test:
    name: Run Forecasting Pipeline
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py

      - name: Verify output files
        run: |
          for prefix in 500209_combined 500510_combined 532174_combined; do
            test -f "outputs/${prefix}_benchmark_results.csv" || { echo "Missing benchmark results CSV for ${prefix}"; exit 1; }
            test -f "outputs/${prefix}_04_benchmark_comparison.png" || { echo "Missing comparison plot for ${prefix}"; exit 1; }
            test -f "outputs/${prefix}_03_all_predictions_overlay.png" || { echo "Missing predictions overlay plot for ${prefix}"; exit 1; }
          done
          echo "All expected outputs verified."

      - name: Verify baseline metrics structure
        run: |
          python -c "
          import csv
          for prefix in ['500209_combined', '500510_combined', '532174_combined']:
              path = f'outputs/{prefix}_benchmark_results.csv'
              with open(path) as f:
                  reader = csv.DictReader(f)
                  models = [row['Model'] for row in reader]
                  assert 'Naive Baseline' in models, f'Naive Baseline missing in {prefix} results'
                  print(f'Verified metrics structure for {prefix}')
          "

      - name: Upload outputs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: outputs/
          retention-days: 30
